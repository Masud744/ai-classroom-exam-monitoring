name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install opencv-contrib-python opencv-python mediapipe ultralytics requests numpy pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "ProctorAI" --add-data "yolov8n.pt;." --add-data "computer_vision;computer_vision" --hidden-import cv2 --hidden-import cv2.cv2 --hidden-import mediapipe --hidden-import mediapipe.solutions --hidden-import mediapipe.tasks --hidden-import numpy --hidden-import numpy.core --hidden-import numpy.linalg --hidden-import ultralytics --hidden-import ultralytics.nn --hidden-import computer_vision.behavior_analysis.attention_score --hidden-import computer_vision.behavior_analysis.suspicious_score --collect-all mediapipe --collect-all numpy --collect-all ultralytics main.py

    - name: Upload EXE as artifact
      uses: actions/upload-artifact@v3
      with:
        name: ProctorAI-Windows
        path: dist/ProctorAI.exe

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/ProctorAI.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}