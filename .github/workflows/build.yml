name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install opencv-python mediapipe==0.10.9 ultralytics requests numpy pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "ProctorAI" --add-data "yolov8n.pt;." --add-data "computer_vision;computer_vision" --hidden-import "computer_vision.behavior_analysis.attention_score" --hidden-import "computer_vision.behavior_analysis.suspicious_score" main.py

    - name: Upload EXE as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ProctorAI-Windows
        path: dist/ProctorAI.exe

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/ProctorAI.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}