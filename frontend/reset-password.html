<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    .container { width: 100%; max-width: 420px; padding: 20px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 22px; font-weight: 700; color: #00d4ff; }
    .logo p { font-size: 13px; color: #666; margin-top: 4px; }
    .card {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 32px;
    }
    .card h2 { font-size: 18px; margin-bottom: 8px; }
    .card p { font-size: 13px; color: #666; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #00d4ff; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #00d4ff;
      color: #000;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.85; }
    .message {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .message.success {
      background: #0d2e1a;
      color: #4ade80;
      border: 1px solid #166534;
      display: block;
    }
    .message.error {
      background: #2e0d0d;
      color: #f87171;
      border: 1px solid #991b1b;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>⬡ AI EXAM MONITOR</h1>
      <p>Intelligent Proctoring System</p>
    </div>
    <div class="card">
      <h2>Reset Password</h2>
      <p>Enter your new password below.</p>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password">
      </div>
      <button class="btn" onclick="resetPassword()">Update Password</button>
      <div id="resetMsg" class="message"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wmkfpbggrkuuuywmungu.supabase.co";
    const SUPABASE_KEY = "your_anon_key_here";

    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_KEY);

    function showMsg(text, type) {
      const el = document.getElementById('resetMsg');
      el.textContent = text;
      el.className = `message ${type}`;
    }

    async function resetPassword() {
      const newPass     = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('confirmPassword').value;

      if (!newPass || !confirmPass) {
        showMsg('Please fill all fields', 'error');
        return;
      }
      if (newPass !== confirmPass) {
        showMsg('Passwords do not match', 'error');
        return;
      }
      if (newPass.length < 6) {
        showMsg('Password must be at least 6 characters', 'error');
        return;
      }

      const { error } = await client.auth.updateUser({ password: newPass });

      if (error) {
        showMsg(error.message, 'error');
      } else {
        showMsg('Password updated! Redirecting to login...', 'success');
        setTimeout(() => window.location.href = 'login.html', 2000);
      }
    }
  </script>
</body>
</html>
